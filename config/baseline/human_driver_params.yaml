# Rule-based human driver parameters

# How far ahead the driver scans for bumps [m]
preview_m: 40.0

# Peak road velocity the driver will accept while crossing a bump [m/s]
zeta_dot_limit: 1.5

# Comfortable deceleration before a bump [m/s²]
a_brake: 2.5

# Comfortable re-acceleration after a bump [m/s²]
a_accel: 2.0

# Speed-control proportional horizon [s]
ctrl_horizon: 1.2
