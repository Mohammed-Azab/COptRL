# Road profile configuration

# Multi-bump layout
dis_mode: constant        # constant | custom

num_bumps: 4

bump_sequence:
  - 1
  - 2
  - 3
  - 1

# Gaps between consecutive bump-end and next bump-start.
custom_dis:  # m
  - 3
  - 5
  - 9
# (num_bumps - 1) entries.

# Uniform gap
constant_dis: 5       # m

# X-position where the first bump starts [m]
bump_x_start: 8.0       # m

# Bump type definitions 
bump_types:
  1:
    bump_height: 0.15
    bump_length: 5.5
  2:
    bump_height: 0.10
    bump_length: 4.0
  3:
    bump_height: 0.20
    bump_length: 6.0
  4:
    bump_height: 0.08
    bump_length: 3.5
  5:
    bump_height: 0.25
    bump_length: 7.0

# Default longitudinal speed
vehicle_speed: 21.6      # km/h  (= 6 m/s)

# Per-episode random road parameters (used when random_road_on_reset=True)
random:
  num_bumps_range:        [1, 5]
  bump_height_range:      [0.05, 0.25]
  bump_length_range:      [1.0, 7.0]
  min_gap:                2.0
  flat_start:             8.0
  v_random_low_factor:    2.0   # v_random_low = v_min * this factor
