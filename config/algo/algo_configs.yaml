# PPO hyperparameters — passed directly to SB3 PPO constructor.
# Keys match SB3 API exactly so they can be unpacked with **kwargs.

PPO:
  policy: MlpPolicy
  learning_rate: "lin_3e-4"
  n_steps: 4096
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.005
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]


# training meta-settings (not passed to SB3, consumed by train.py)
training:
  seed: 42
  total_timesteps: 5_000_000
  n_envs: 4
  n_eval_envs: 1
  eval_freq: 20_000
  n_eval_episodes: 10
  checkpoint_freq: 100_000
  norm_obs: true
  norm_reward: true
  eval_road: speed_bump
