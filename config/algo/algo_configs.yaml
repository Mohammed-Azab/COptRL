# PPO hyperparameters for SB3 PPO constructor.
# Keys match SB3 API exactly so they can be unpacked with **kwargs.

PPO:
  policy: MlpPolicy
  learning_rate: "lin_3e-5"
  n_steps: 4096
  batch_size: 256
  n_epochs: 10
  gamma: 0.999
  gae_lambda: 0.98
  clip_range: 0.2
  ent_coef: 0.002
  vf_coef: 0.7
  max_grad_norm: 0.83
  policy_kwargs:
    net_arch:
      pi: [128, 128]
      vf: [128, 128]

training:
  seed: 42
  total_timesteps: 10_000_000
  n_envs: 5
  n_eval_envs: 1
  eval_freq: 50_000
  n_eval_episodes: 10
  checkpoint_freq: 200_000
  norm_obs: true
  norm_reward: true
  eval_road: speed_bump
