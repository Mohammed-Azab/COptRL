# PPO hyperparameters — canonical values from Schulman et al. (2017) with
# long-horizon adjustments (gamma=0.999, moderate entropy for curriculum).
# Keys match SB3 API exactly so they can be unpacked with **kwargs.

PPO:
  policy: MlpPolicy
  learning_rate: 3.0e-04      
  n_steps: 2048                
  batch_size: 64              
  n_epochs: 10                
  gamma: 0.999                
  gae_lambda: 0.95            
  clip_range: 0.2             
  ent_coef: 0.01
  vf_coef: 0.5                
  max_grad_norm: 0.5          
  policy_kwargs:
    net_arch:
      pi: [256, 256]        
      vf: [256, 256]

training:
  seed: 42
  total_timesteps: 5_000_000
  n_envs: 5
  n_eval_envs: 1
  eval_freq: 100_000
  n_eval_episodes: 30
  checkpoint_freq: 500_000
  norm_obs: true
  norm_reward: true
  eval_road: speed_bump
