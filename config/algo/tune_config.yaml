# PPO search space for Optuna.
# Available types: float_log | float | int | categorical

PPO:
  learning_rate:
    type: float_log
    low: 1.0e-5
    high: 1.0e-3      

  n_steps:
    type: categorical
    choices: [1024, 2048, 4096]

  batch_size:
    type: categorical
    choices: [64, 128, 256]

  n_epochs:
    type: int
    low: 5
    high: 20

  gamma:
    type: float
    low: 0.97
    high: 0.999

  gae_lambda:
    type: float
    low: 0.90
    high: 0.99

  clip_range:
    type: categorical
    choices: [0.1, 0.2, 0.3]

  ent_coef:
    type: float_log
    low: 1.0e-8
    high: 1.0e-2

  vf_coef:
    type: float
    low: 0.3
    high: 0.9

  max_grad_norm:
    type: float
    low: 0.3
    high: 1.0

# policy_kwargs.net_arch
  n_units:
    type: categorical
    choices: [128, 256, 512]

# defaults for tune.py — overridden by CLI flags
defaults:
  timesteps_per_trial: 300_000   # 300k gives a meaningful learning signal per trial
  n_eval_episodes:     10        # more episodes → more reliable Optuna objective
  eval_road:           speed_bump
  train_road:          speed_bump
  seed:                1000
  n_jobs:              1
  direction:           maximize
  use_curriculum:      false     # off: each trial trains on the same road distribution
                                 # (curriculum thresholds are too strict for short trials)
