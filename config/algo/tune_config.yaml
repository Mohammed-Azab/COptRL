# PPO search space for Optuna.
# Each parameter entry has:
#   type: float_log | float | int | categorical
#   low / high  (for float / int / float_log)
#   choices     (for categorical)
#
# n_units is a convenience alias: resolved to policy_kwargs.net_arch inside the sampler.

PPO:
  learning_rate:
    type: float_log
    low: 1.0e-5
    high: 3.0e-4

  n_steps:
    type: categorical
    choices: [1024, 2048, 4096]

  batch_size:
    type: categorical
    choices: [64, 128, 256]

  n_epochs:
    type: int
    low: 5
    high: 20

  gamma:
    type: float
    low: 0.97
    high: 0.999

  gae_lambda:
    type: float
    low: 0.90
    high: 0.99

  clip_range:
    type: categorical
    choices: [0.1, 0.2, 0.3]

  ent_coef:
    type: float_log
    low: 1.0e-8
    high: 1.0e-2

  n_units:
    type: categorical
    choices: [128, 256, 512]

# defaults for tune.py (overridden by CLI flags)
defaults:
  timesteps_per_trial: 100_000
  n_eval_episodes:     5
  eval_road:           speed_bump
  train_road:          speed_bump
  seed:                0
  n_jobs:              1
  direction:           maximize
  use_curriculum:      true
