# Fallback random-road parameters per curriculum level.
# Used when pre-generated scenario files are absent, or for the multi-bump
# fraction at level 3 (see allow_multi_bump in curriculum_params.yaml).
# Speed values in km/h.

levels:
  0:
    num_bumps_range:  [1, 1]
    catalog_ids:      [3, 4]
    min_gap:          20.0
    max_gap:          50.0
    flat_start:       60.0
    v_random_low:     18.0
    v_random_high:    32.0

  1:
    num_bumps_range:  [1, 1]
    catalog_ids:      [0, 1, 3, 4]
    min_gap:          12.0
    max_gap:          35.0
    flat_start:       45.0
    v_random_low:     25.0
    v_random_high:    45.0

  2:
    num_bumps_range:  [1, 1]
    catalog_ids:      [0, 1, 2, 3, 4]
    min_gap:          8.0
    max_gap:          25.0
    flat_start:       30.0
    v_random_low:     35.0
    v_random_high:    50.0

  3:
    num_bumps_range:  [2, 4]
    catalog_ids:      [0, 1, 2, 3, 4]
    min_gap:          5.0
    max_gap:          15.0
    flat_start:       30.0
    v_random_low:     18.0
    v_random_high:    50.0
