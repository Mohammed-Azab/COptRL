# Curriculum configuration for COptRL speed-bump training.
# Speed values are in km/h — loaders convert to m/s internally.

advance_return_threshold:
  0:  +190.0
  1:  +175.0
  2:  +155.0

advance_window: 7  # episodes

levels:
  0:                              # easy — gentle slopes, wide spacing
    num_bumps_range:  [1, 2]
    catalog_ids:      [3, 4]
    min_gap:          20.0        # m
    max_gap:          50.0        # m
    flat_start:       25.0        # m  (≥ brake dist from 54 km/h = 23 m)
    v_random_low:     25.0   # km/h
    v_random_high:    54.0   # km/h

  1:                              # medium — add short and medium bumps, moderate spacing
    num_bumps_range:  [1, 3]
    catalog_ids:      [0, 1, 3, 4]
    min_gap:          12.0        # m
    max_gap:          35.0        # m
    flat_start:       40.0        # m  (≥ brake dist from 72 km/h = 40 m)
    v_random_low:     25.0   # km/h
    v_random_high:    72.0   # km/h

  2:                              # hard — full catalog, tighter spacing
    num_bumps_range:  [1, 4]
    catalog_ids:      [0, 1, 2, 3, 4]
    min_gap:          8.0         # m
    max_gap:          25.0        # m
    flat_start:       40.0        # m  (≥ brake dist from 72 km/h = 40 m)
    v_random_low:     18.0   # km/h
    v_random_high:    72.0   # km/h

  3:                              # expert — full catalog, more bumps, minimum realistic spacing
    num_bumps_range:  [2, 6]
    catalog_ids:      [0, 1, 2, 3, 4]
    min_gap:          5.0         # m
    max_gap:          15.0        # m
    flat_start:       40.0        # m  (≥ brake dist from 72 km/h = 40 m)
    v_random_low:     18.0   # km/h
    v_random_high:    72.0   # km/h
