# Curriculum configuration for COptRL speed-bump training.
# Speed values are in km/h — loaders convert to m/s internally.
#
# Performance-gated advancement: the agent stays at a level until its mean
# eval return (averaged over the last `advance_window` evaluations) meets or
# exceeds the threshold for that level. This ensures harder roads are only
# introduced once the agent has genuinely learned the current difficulty.
#
# Bump types are referenced by 0-based catalog ID from speed_bumps.json (Mandl 2021):
#   0 = short_bump    peak ζ̇ ≈ 1.7 m/s @20 m/s  — moderate
#   1 = medium_bump   peak ζ̇ ≈ 1.8 m/s @20 m/s  — moderate
#   2 = severe_bump   peak ζ̇ ≈ 6.3 m/s @20 m/s  — very steep
#   3 = long_bump     peak ζ̇ ≈ 0.8 m/s @20 m/s  — gentle despite height
#   4 = raised_crosswalk  peak ζ̇ ≈ 1.3 m/s @20 m/s  — gentle

# Minimum mean eval return required to leave each level.
# Set a level's threshold to a very high value to keep it as the final level.
advance_return_threshold:
  0:  -80.0   # leave level 0 once mean eval return ≥ -80  (was -120, too lenient)
  1:  -60.0   # leave level 1 once mean eval return ≥ -60  (was -100)
  2:  -40.0   # leave level 2 once mean eval return ≥ -40  (was -80)
  # level 3 has no threshold — it is the final level

# Number of consecutive eval runs that must all meet the threshold.
# Higher = more stable gating, slower advancement.
advance_window: 5            # was 3 — agent was advancing before truly mastering level

levels:
  0:                              # easy — gentle slopes only (ids 3, 4)
    num_bumps_range:  [1, 2]
    catalog_ids:      [3, 4]      # long_bump and raised_crosswalk: peak ζ̇ < 1.5 m/s @20 m/s
    min_gap:          5.0
    flat_start:       8.0
    v_random_low:     25.0   # km/h
    v_random_high:    54.0   # km/h

  1:                              # medium — add short and medium bumps (ids 0, 1)
    num_bumps_range:  [1, 3]
    catalog_ids:      [0, 1, 3, 4]
    min_gap:          4.0
    flat_start:       8.0
    v_random_low:     25.0   # km/h
    v_random_high:    72.0   # km/h

  2:                              # hard — full catalog including severe_bump (id 2)
    num_bumps_range:  [1, 4]
    catalog_ids:      [0, 1, 2, 3, 4]
    min_gap:          3.0
    flat_start:       8.0
    v_random_low:     18.0   # km/h
    v_random_high:    72.0   # km/h

  3:                              # expert — full catalog, more bumps, tighter gaps
    num_bumps_range:  [2, 6]
    catalog_ids:      [0, 1, 2, 3, 4]
    min_gap:          2.0
    flat_start:       6.0
    v_random_low:     18.0   # km/h
    v_random_high:    72.0   # km/h
