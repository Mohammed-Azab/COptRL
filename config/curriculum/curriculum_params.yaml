# Speed values in km/h; CurriculumWrapper converts to m/s internally.
# Fallback road params (when scenario files are absent) live in curr_multi_bumps.yaml.

advance_return_threshold:
  0:    0.0
  1:    20.0
  2:    50.0

advance_window: 3

scenarios_dir: config/train/scenarios

levels:
  0:
    difficulty: easy

  1:
    difficulty: medium

  2:
    difficulty: hard

  3:
    difficulty: expert
    allow_multi_bump: false
    multi_bump_prob:  0.25
