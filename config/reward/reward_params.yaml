# Reward configuration for COptRL
weights:
  w_tracking:       0.8   
  w_accel:          0.4  
  w_jerk:           0.2   
  w_action_smooth:  0.1 

vertical:
  w_heave:          0.8   
  w_wheel:          0.3   
  a_B_comfort:      0.5   
  a_W_comfort:     30.0   
  reward_heave_clip:  1.0   # m/s²
  reward_wheel_clip: 60.0   # m/s²

  enable_heave:     true
  enable_wheel:     true
  enable_vel_scaling: true

enable:
  tracking:      true
  accel:         true
  jerk:          true
  action_smooth: true

velocity:
  v_max:  20.0
  a_max:   5.0
  v_min:   2.0

comfort:
  a_comfort:           2.0   # m/s²
  accel_filter_alpha:  0.8   # IIR smoothing
  accel_clip:          8.0   # m/s²
  reward_accel_clip:   4.0   # m/s² 

jerk:
  j_max:              2.0    # m/s³
  jerk_filter_alpha:   0.8
  jerk_clip:          12.0   # m/s³  
  reward_jerk_clip:    4.0   # m/s³ 

terminal:
  terminal_bonus:    100.0
  terminal_penalty: -100.0
  a_limit:            1.0

observations:
  preview_distance:    20.0
  h_clip:              0.15
  n_peaks:             3
  peak_height_min:     0.01
  peak_distance_min_m: 0.5
  noise_active:        true
  noise_height_std:    0.005
  noise_distance_std:  0.5
  noise_width_std:     0.05
  pt1_tau:             0.2
