# Reward configuration for COptRL
# Mandl weights (g-normalised), COptRL additions kept separately
weights:
  # Mandl 2024 weights
  Q_zBddot:         50.0   # body vertical accel  (was w_heave: 0.8)
  Q_zWddot:          0.5   # wheel vertical accel  (was w_wheel: 0.6)
  Q_a:               1.0   # longitudinal accel    (was w_accel: 0.3)
  Q_v:               1.0   # speed tracking        (was w_tracking: 0.2)
  Q_step:            0.1   # per-step bonus        (was step_bonus: 0.05)
  # COptRL additions (no Mandl equivalent)
  w_jerk:            0.4
  w_action_smooth:   0.1
  w_progress:        0.15
  w_bump_cross:     20.0

vertical:
  g:                 9.81   # m/s², used as reward normaliser (Mandl convention)
  a_B_comfort:       3.0    # kept for obs-space bounds only
  a_W_comfort:      30.0    # kept for obs-space bounds only
  reward_heave_clip: 8.0
  reward_wheel_clip: 60.0   # m/s²

velocity:
  v_max:   50.0   # km/h (13.9 m/s), hard cap
  a_max:    5.0   # m/s²
  v_min:    7.2   # km/h  (2 m/s)
  v_ref_low: 25.0 # km/h — lower bound for per-episode v_ref sampling (Mandl)

comfort:
  a_comfort:           2.0   # m/s², obs-space bounds only
  accel_filter_alpha:  0.8
  accel_clip:          9.81  # m/s²
  reward_accel_clip:   4.0   # m/s²

jerk:
  j_max:              2.0    # m/s³
  jerk_filter_alpha:   0.8
  jerk_clip:          12.0   # m/s³
  reward_jerk_clip:    4.0   # m/s³

terminal:
  terminal_bonus:    100.0
  terminal_penalty: -100.0
  a_limit:            5.0   # m/s²

observations:
  preview_distance:    60.0   # m, matches flat_start
  h_clip:              0.15
  n_peaks:             3
  peak_height_min:     0.01
  peak_distance_min_m: 0.5
  noise_active:        false
  noise_height_std:    0.005
  noise_distance_std:  0.5
  noise_width_std:     0.05
  pt1_tau:             0.05  # s
