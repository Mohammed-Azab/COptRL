# Reward configuration for COptRL
weights:
  w_tracking:       0.3
  w_accel:          0.4
  w_jerk:           0.2
  w_action_smooth:  0.1
  w_heave:          0.8
  w_wheel:          0.3
  w_progress:       0.2
  w_bump_cross:     10.0
  step_bonus:       0.5

vertical:
  a_B_comfort:      3.0
  a_W_comfort:     30.0
  reward_heave_clip:  8.0
  reward_wheel_clip: 60.0   # m/s²

velocity:
  v_max:  50.0   # km/h  (13.9 m/s) — hard cap; env clips v to this after every ODE step
  a_max:   5.0   # m/s²
  v_min:   7.2   # km/h  (2 m/s)
  v_limit: 50.0  # km/h  — kept equal to v_max; upper r_speed_band penalty is dead with hard cap

comfort:
  a_comfort:           2.0   # m/s²
  accel_filter_alpha:  0.8
  accel_clip:          8.0   # m/s²
  reward_accel_clip:   4.0   # m/s²

jerk:
  j_max:              2.0    # m/s³
  jerk_filter_alpha:   0.8
  jerk_clip:          12.0   # m/s³
  reward_jerk_clip:    4.0   # m/s³

terminal:
  terminal_bonus:    100.0
  terminal_penalty: -100.0
  a_limit:            5.0   # m/s²

observations:
  preview_distance:    60.0   # m  — matches flat_start; guarantees first bump visible from s=0
  h_clip:              0.15
  n_peaks:             3
  peak_height_min:     0.01
  peak_distance_min_m: 0.5
  noise_active:        false
  noise_height_std:    0.005
  noise_distance_std:  0.5
  noise_width_std:     0.05
  pt1_tau:             0.05  # s  — reduced lag; at v=20 m/s closes only 1m vs 4m before
