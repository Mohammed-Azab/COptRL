# Reward configuration for COptRL
weights:
  Q_zBddot:          3.0    
  Q_zWddot:          0.05   
  Q_a:               0.8    
  Q_v:               0.5    
  Q_step:            0.1   

  w_jerk:            0.3    
  w_action_smooth:   0.0

vertical:
  g:                 9.81
  reward_heave_clip: 8.0
  reward_wheel_clip: 60.0

velocity:
  v_limit:  50.0   # km/h
  a_max:    15.0   # m/s²
  v_min:     3.0   # km/h
  v_init_low: 25.0 # km/h, lower bound for per-episode v_init sampling

comfort:
  a_comfort:           2.0   # m/s², ISO 2631-1 "slightly uncomfortable" threshold
  accel_filter_alpha:  0.8
  accel_clip:          9.81
  reward_accel_clip:   4.0

jerk:
  j_max:              2.0   # m/s³, ISO 2631-1 onset of perceptible jerk
  jerk_filter_alpha:   0.8
  jerk_clip:          12.0
  reward_jerk_clip:    4.0

terminal:
  terminal_bonus:    300.0
  terminal_penalty: -5000.0
  a_limit:            5.0

observations:
  preview_distance:    60.0
  h_clip:              0.15
  n_peaks:             3
  peak_height_min:     0.01
  peak_distance_min_m: 0.5
  noise_active:        false
  noise_height_std:    0.005
  noise_distance_std:  0.5
  noise_width_std:     0.05
  pt1_tau:             0.05
