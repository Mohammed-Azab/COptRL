# timing and layout scale
RENDER_Y_SCALE: 5
RENDER_HIST_SECS: 5.0

# which time-series to show (if any)
RENDER_SHOW_TS: true
RENDER_TS_Z: true
RENDER_TS_Z_DDOT: true
RENDER_TS_SPEED: true

# whether to freeze the render on episode end
RENDER_FREEZE_EPISODE: true

RENDER_BUMP_MARKERS: true

# nominal draw-space sizes
RENDER_Y_W_NOM: 2.0
RENDER_Y_B_NOM: 4.0
RENDER_H_MW: 0.45
RENDER_W_MW: 1.75
RENDER_H_MB: 0.45
RENDER_W_MB: 1.75
RENDER_XLIM:
  - -3.0
  - 15.0
RENDER_YLIM:
  - -2.0
  - 8.5
RENDER_ROAD_HALF: 15.0
RENDER_ROAD_N: 300
RENDER_GROUND_Y: 1.5

# color palette
RENDER_C_MB: "#f5c842"
RENDER_C_MW: "#4a86c8"
RENDER_C_SPRING: "#e05a1c"
RENDER_C_DAMPER: "#4a86c8"
RENDER_C_ROAD: "#aaaaaa"
RENDER_C_GROUND: "#222222"

# spring geometry
RENDER_SP_X: -0.42
RENDER_SP_W: 0.18
RENDER_SP_N: 8

# damper geometry
RENDER_DA_X: 0.6
RENDER_DA_W: 0.5
RENDER_DA_PIST_H: 0.3
RENDER_DA_PIST_FRAC: 0.48
RENDER_DA_LOWER_STEM: 0.2
RENDER_DA_CYL_H_SUSP: 0.88
RENDER_DA_CYL_H_TIRE: 0.8

# contact/ground markers
RENDER_CONTACT_STEM: 0
Y_LINE_OFFSET: 0.7

# speed arrow (data coordinates on the schematic axis)
RENDER_ARR_X:   -2.5   # arrow base x
RENDER_ARR_Y:    5.5   # arrow y — keep below info box bottom
RENDER_ARR_LEN:  8.0   # full-length at v_max (tip at x = ARR_X + ARR_LEN)
