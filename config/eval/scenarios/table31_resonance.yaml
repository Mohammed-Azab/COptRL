# Mandl (2021) Table 3.1 — resonance excitation sequence at 40 km/h
# At 40 km/h all three bumps are gentle enough (ζ̇_max < 1.5 m/s) that
# a cautious driver does not need to brake — tests comfort at design speed.
name: table31_resonance
description: "Table 3.1 resonance sequence (short→medium→long) at 40 km/h design speed"
source: "Mandl (2021) Table 3.1"
vehicle_speed_kmh: 40.0
bumps:
  - catalog_id: 0    # short_bump:  H=2.5cm, W=0.92m  @ x=50
    x_start_m: 50.0
  - catalog_id: 1    # medium_bump: H=6.25cm, W=2.22m  @ x=66
    x_start_m: 66.0  # 50 + 0.92 + 15 gap
  - catalog_id: 3    # long_bump:   H=12.5cm, W=9.5m   @ x=88
    x_start_m: 88.0  # 66 + 2.22 + 20 gap
